<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sitemap</title>
  <link rel="icon" href="/assets/refrigerator.png" type="image/png" />
  <style>
    @font-face {
      font-family: "Molot";
      src: url("/assets/fonts/Molot.otf") format("opentype");
      font-display: swap;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: url("/assets/sitemap-tile.png") repeat;
      background-size: 200px 200px;
      font-family: "Trebuchet MS", sans-serif;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .drift-link {
      position: absolute;
      top: 0;
      left: 0;
      text-decoration: none;
      font-family: "Molot", "Trebuchet MS", sans-serif;
      font-size: 25px;
      -webkit-text-stroke: 1.5px black;
      paint-order: stroke fill;
      white-space: nowrap;
      will-change: transform;
      padding: 0.6em 1.2em;
      isolation: isolate;
    }

    .drift-link::before {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--fish) no-repeat center / 100% 100%;
      z-index: -1;
      transform-origin: center;
    }

    .drift-link.face-right::before {
      transform: scaleX(-1);
    }

    .mobile-note {
      display: none;
    }

    @media (max-width: 768px) {
      .mobile-note {
        display: block;
        position: fixed;
        bottom: 10px;
        left: 0;
        right: 0;
        padding: 0 10px;
        font-family: "Trebuchet MS", sans-serif;
        font-size: 14px;
        color: red;
        text-align: center;
        z-index: 1000;
      }

      .mobile-note span {
        background: yellow;
        padding: 2px 6px;
        box-decoration-break: clone;
        -webkit-box-decoration-break: clone;
      }
    }

    .drift-link:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="stage" id="stage">
    <a class="drift-link" href="/fridge-poems/" style="color: #ff1f4a;">fridge poems</a>
    <a class="drift-link" href="/about/" style="color: #1fc94a;">about</a>
    <a class="drift-link" href="/feed/" style="color: #1f7eff;">feed</a>
    <a class="drift-link" href="/journal/" style="color: #ff7a14;">journal</a>
    <a class="drift-link" href="/books/" style="color: #8a1fe6;">books</a>
    <a class="drift-link" href="/movies/" style="color: #ff3d8a;">movies</a>
    <a class="drift-link" href="/barter/" style="color: #14c4b8;">barter</a>
    <a class="drift-link" href="/guestbook/" style="color: #ffd11a;">guestbook</a>
    <a class="drift-link" href="/epiccoolgirl/" style="color: #ff4fc8;">epiccoolgirl</a>
    <a class="drift-link" href="/v-day-w-vi/" style="color: #a3e635;">v-day-w-vi</a>
    <a class="drift-link" href="/wnrs/" style="color: #00bfff;">wnrs</a>
  </div>

  <div class="mobile-note"><span>pond is getting a little crowded, please view me on desktop</span></div>

  <script>
    const stage = document.getElementById("stage");
    const links = Array.from(document.querySelectorAll(".drift-link"));

    const fishCount = 5;
    links.forEach((el) => {
      const n = 1 + Math.floor(Math.random() * fishCount);
      el.style.setProperty("--fish", `url("/assets/fish/fish${n}.png")`);
    });

    const items = links.map((el) => ({
      el,
      x: Math.random() * (stage.clientWidth - 100),
      y: Math.random() * (stage.clientHeight - 30),
      vx: (Math.random() < 0.5 ? -1 : 1) * (0.1 + Math.random() * 0.3),
      vy: (Math.random() < 0.5 ? -1 : 1) * (0.1 + Math.random() * 0.3),
    }));

    function tick() {
      const w = stage.clientWidth;
      const h = stage.clientHeight;
      for (const it of items) {
        const ew = it.el.offsetWidth;
        const eh = it.el.offsetHeight;
        it.x += it.vx;
        it.y += it.vy;
        if (it.x < 0) {it.x = 0; it.vx = -it.vx;}
        if (it.x + ew > w) {it.x = w - ew; it.vx = -it.vx;}
        if (it.y < 0) {it.y = 0; it.vy = -it.vy;}
        if (it.y + eh > h) {it.y = h - eh; it.vy = -it.vy;}
      }
      for (let i = 0; i < items.length; i++) {
        const a = items[i];
        const aw = a.el.offsetWidth;
        const ah = a.el.offsetHeight;
        for (let j = i + 1; j < items.length; j++) {
          const b = items[j];
          const bw = b.el.offsetWidth;
          const bh = b.el.offsetHeight;
          const dx = (a.x + aw / 2) - (b.x + bw / 2);
          const dy = (a.y + ah / 2) - (b.y + bh / 2);
          const overlapX = (aw + bw) / 2 - Math.abs(dx);
          const overlapY = (ah + bh) / 2 - Math.abs(dy);
          if (overlapX > 0 && overlapY > 0) {
            if (overlapX < overlapY) {
              const push = overlapX / 2 * Math.sign(dx);
              a.x += push; b.x -= push;
              [a.vx, b.vx] = [b.vx, a.vx];
            } else {
              const push = overlapY / 2 * Math.sign(dy);
              a.y += push; b.y -= push;
              [a.vy, b.vy] = [b.vy, a.vy];
            }
          }
        }
      }
      for (const it of items) {
        it.el.style.transform = `translate(${it.x}px, ${it.y}px)`;
        const faceRight = it.vx > 0;
        if (faceRight !== it.faceRight) {
          it.el.classList.toggle("face-right", faceRight);
          it.faceRight = faceRight;
        }
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  </script>
</body>

</html>
