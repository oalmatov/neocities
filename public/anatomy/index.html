<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" href="assets/heart.png" type="image/png" />
        <link rel="stylesheet" href="styles.css" />
        <title>anatomy</title>
    </head>
    <body>
        <div class="container">
            <div class="eyes-container">
                <img src="assets/eye-open-left.png" class="eye base-eye" alt="Left eye open" />
                <img src="assets/eye-open-right.png" class="eye base-eye" alt="Right eye open" />
                <img src="assets/eye-closed-left.png" class="eye left-closed" alt="Left eye closed" />
                <img src="assets/eye-closed-right.png" class="eye right-closed" alt="Right eye closed" />
            </div>
        </div>
        <script>
            const eyesContainer = document.querySelector(".eyes-container");
            const leftClosed = document.querySelector(".left-closed");
            const rightClosed = document.querySelector(".right-closed");

            const BLINK_INTERVAL = 4000;
            const JITTER = 1000;
            let blinkTimeoutId;
            let isHovering = false;

            function blink() {
                if (!isHovering) {
                    leftClosed.style.display = "block";
                    rightClosed.style.display = "block";

                    setTimeout(() => {
                        if (!isHovering) {
                            leftClosed.style.display = "none";
                            rightClosed.style.display = "none";
                        }
                    }, 150);
                }

                const jitter = Math.random() * JITTER * 2 - JITTER;
                const nextBlink = BLINK_INTERVAL + jitter;
                blinkTimeoutId = setTimeout(blink, nextBlink);
            }

            blinkTimeoutId = setTimeout(blink, BLINK_INTERVAL);

            eyesContainer.addEventListener("mouseenter", () => {
                isHovering = true;
                clearTimeout(blinkTimeoutId);
            });

            eyesContainer.addEventListener("mousemove", (e) => {
                const rect = eyesContainer.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const halfWidth = rect.width / 2;

                if (mouseX < halfWidth) {
                    leftClosed.style.display = "block";
                    rightClosed.style.display = "none";
                } else {
                    leftClosed.style.display = "none";
                    rightClosed.style.display = "block";
                }
            });

            eyesContainer.addEventListener("mouseleave", () => {
                isHovering = false;
                leftClosed.style.display = "none";
                rightClosed.style.display = "none";
                clearTimeout(blinkTimeoutId);
                const jitter = Math.random() * JITTER * 2 - JITTER;
                blinkTimeoutId = setTimeout(blink, BLINK_INTERVAL + jitter);
            });
        </script>
    </body>
</html>
